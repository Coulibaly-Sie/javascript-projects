<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Météo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      color: white;
    }
    h1 { font-size: 1.6rem; margin-bottom: 20px; text-align: center; }
    .search { display: flex; gap: 8px; margin-bottom: 24px; }
    .search input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .search input::placeholder { color: rgba(255,255,255,0.6); }
    .search button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .search button:hover { background: rgba(255,255,255,0.45); }
    #result { display: none; }
    .city-name { font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 4px; }
    .condition { text-align: center; font-size: 1rem; color: rgba(255,255,255,0.8); margin-bottom: 20px; }
    .big-icon { font-size: 5rem; text-align: center; margin-bottom: 10px; }
    .temp-main { font-size: 3.5rem; font-weight: bold; text-align: center; margin-bottom: 20px; }
    .details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-box {
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .detail-box .label { font-size: 0.75rem; color: rgba(255,255,255,0.65); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-box .value { font-size: 1.3rem; font-weight: bold; }
    .error { color: #ffb3b3; text-align: center; padding: 12px; font-size: 0.95rem; }
    .loading { text-align: center; color: rgba(255,255,255,0.7); padding: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⛅ Météo</h1>
    <div class="search">
      <input type="text" id="city-input" placeholder="Entrez une ville..." maxlength="80">
      <button onclick="search()">🔍</button>
    </div>
    <div id="message"></div>
    <div id="result">
      <div class="big-icon" id="icon"></div>
      <div class="city-name" id="city-name"></div>
      <div class="condition" id="condition"></div>
      <div class="temp-main" id="temp"></div>
      <div class="details">
        <div class="detail-box">
          <div class="label">Ressenti</div>
          <div class="value" id="feels"></div>
        </div>
        <div class="detail-box">
          <div class="label">Humidité</div>
          <div class="value" id="humidity"></div>
        </div>
        <div class="detail-box">
          <div class="label">Vent</div>
          <div class="value" id="wind"></div>
        </div>
        <div class="detail-box">
          <div class="label">Pluie 24h</div>
          <div class="value" id="rain"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WMO_CODES = {
      0: ['Ciel dégagé', '☀️'],
      1: ['Principalement dégagé', '🌤️'],
      2: ['Partiellement nuageux', '⛅'],
      3: ['Couvert', '☁️'],
      45: ['Brouillard', '🌫️'],
      48: ['Brouillard givrant', '🌫️'],
      51: ['Bruine légère', '🌦️'],
      53: ['Bruine modérée', '🌦️'],
      55: ['Bruine dense', '🌧️'],
      61: ['Pluie légère', '🌧️'],
      63: ['Pluie modérée', '🌧️'],
      65: ['Pluie forte', '🌧️'],
      71: ['Neige légère', '🌨️'],
      73: ['Neige modérée', '❄️'],
      75: ['Neige forte', '❄️'],
      80: ['Averses légères', '🌦️'],
      81: ['Averses', '🌧️'],
      82: ['Averses violentes', '⛈️'],
      95: ['Orage', '⛈️'],
      99: ['Orage avec grêle', '⛈️'],
    };

    document.getElementById('city-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });

    async function search() {
      const city = document.getElementById('city-input').value.trim();
      if (!city) return;

      showMessage('<p class="loading">Recherche en cours...</p>');
      document.getElementById('result').style.display = 'none';

      try {
        const geoRes = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=fr&format=json`
        );
        const geoData = await geoRes.json();

        if (!geoData.results || geoData.results.length === 0) {
          showMessage('<p class="error">Ville introuvable. Essayez un autre nom.</p>');
          return;
        }

        const { latitude, longitude, name, country } = geoData.results[0];

        const meteoRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
          `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,precipitation` +
          `&daily=precipitation_sum&timezone=auto&forecast_days=1`
        );
        const meteoData = await meteoRes.json();
        const cur = meteoData.current;

        const code = cur.weather_code;
        const [condition, emoji] = WMO_CODES[code] || ['Inconnu', '🌡️'];

        document.getElementById('icon').textContent = emoji;
        document.getElementById('city-name').textContent = `${name}, ${country}`;
        document.getElementById('condition').textContent = condition;
        document.getElementById('temp').textContent = `${Math.round(cur.temperature_2m)}°C`;
        document.getElementById('feels').textContent = `${Math.round(cur.apparent_temperature)}°C`;
        document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
        document.getElementById('wind').textContent = `${Math.round(cur.wind_speed_10m)} km/h`;
        const rain = meteoData.daily?.precipitation_sum?.[0] ?? 0;
        document.getElementById('rain').textContent = `${rain} mm`;

        showMessage('');
        document.getElementById('result').style.display = 'block';

      } catch (err) {
        showMessage('<p class="error">Erreur réseau. Vérifiez votre connexion.</p>');
      }
    }

    function showMessage(html) {
      document.getElementById('message').innerHTML = html;
    }
  </script>
</body>
</html>
