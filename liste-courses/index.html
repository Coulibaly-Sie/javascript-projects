<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste de Courses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 28px;
    }
    h1 { font-size: 1.6rem; color: #2d3748; margin-bottom: 6px; }
    .counter { font-size: 0.9rem; color: #718096; margin-bottom: 20px; }
    .counter span { color: #48bb78; font-weight: bold; }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #48bb78; }
    .input-row button {
      padding: 10px 18px;
      background: #48bb78;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: bold;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #38a169; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button {
      padding: 5px 14px;
      border: 2px solid #e2e8f0;
      background: transparent;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #718096;
      transition: all 0.2s;
    }
    .filters button.active {
      background: #48bb78;
      border-color: #48bb78;
      color: white;
    }
    .list { display: flex; flex-direction: column; gap: 8px; }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f7fafc;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s;
    }
    .item.done { opacity: 0.55; }
    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }
    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
    }
    .item.done .item-name { text-decoration: line-through; color: #a0aec0; }
    .item button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #fc8181;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .item button:hover { background: #fed7d7; }
    .empty { text-align: center; color: #a0aec0; padding: 24px; font-size: 0.95rem; }
    .clear-btn {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: none;
      border: 1px solid #fc8181;
      color: #fc8181;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: #fff5f5; }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 Liste de Courses</h1>
    <p class="counter"><span id="remaining">0</span> article(s) restant(s)</p>
    <div class="input-row">
      <input type="text" id="input" placeholder="Ajouter un article..." maxlength="60">
      <button onclick="addItem()">+</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tout</button>
      <button onclick="setFilter('remaining', this)">Restant</button>
      <button onclick="setFilter('done', this)">Coché</button>
    </div>
    <div class="list" id="list"></div>
    <button class="clear-btn" onclick="clearDone()">Supprimer les articles cochés</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('courses') || '[]');
    let filter = 'all';

    const input = document.getElementById('input');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function save() {
      localStorage.setItem('courses', JSON.stringify(items));
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) return;
      items.push({ id: Date.now(), name, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const remaining = items.filter(i => !i.done).length;
      document.getElementById('remaining').textContent = remaining;

      const visible = items.filter(i => {
        if (filter === 'remaining') return !i.done;
        if (filter === 'done') return i.done;
        return true;
      });

      const list = document.getElementById('list');
      if (visible.length === 0) {
        list.innerHTML = '<p class="empty">Aucun article ici.</p>';
        return;
      }
      list.innerHTML = visible.map(item => `
        <div class="item ${item.done ? 'done' : ''}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem(${item.id})">
          <span class="item-name">${escapeHtml(item.name)}</span>
          <button onclick="deleteItem(${item.id})" title="Supprimer">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    render();
  </script>
</body>
</html>
